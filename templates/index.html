<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Agentic AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Smart Home Dashboard</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab1')">Device Information</button>
            <button class="tab-btn" onclick="openTab(event, 'tab2')">Manual Control</button>
            <button class="tab-btn" onclick="openTab(event, 'tab3')">AI Chat</button>
        </div>

        <div id="tab1" class="tab-content active">
            <div class="header-action">
                <h2>Current Appliances Info</h2>
                <button class="refresh-btn" onclick="fetchAndRenderData()">Refresh Data</button>
            </div>
            <div id="tab1-nodes">Loading devices...</div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="header-action">
                <h2>Control Actuators</h2>
                <button class="refresh-btn" onclick="fetchAndRenderData()">Refresh Devices</button>
            </div>
            <div id="tab2-nodes">Loading actuators...</div>
        </div>

        <div id="tab3" class="tab-content">
            <h2>Agentic AI Chat</h2>
            <div class="chat-box">
                <div class="chat-history">
                    <p><em>AI: Hello! How can I manage your home today?</em></p>
                </div>
                <div class="chat-input-area">
                    <input type="text" placeholder="Type a message..." disabled>
                    <button disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
